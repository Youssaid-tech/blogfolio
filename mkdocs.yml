site_name: Youssef OUSSAID
site_url: https://youssef.oussaid.net
site_author: Youssef OUSSAID
site_description: >-
  DevOps & Systems Engineer with 9 years of experience — Azure Cloud, Kubernetes,
  CI/CD and infrastructure automation. Plus a learning log on RHCSA, Kubernetes,
  Azure, IaC, configuration management and observability.

copyright: Copyright &copy; 2026 Youssef OUSSAID

theme:
  name: material
  custom_dir: overrides
  language: en
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  logo: assets/portfolio/azure-logo.svg
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  # Single light "Azure" scheme — matches the always-light portfolio.
  palette:
    scheme: default
    primary: white
    accent: blue
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

# The portfolio home and the blog landing are reached from the header buttons,
# so they're kept out of the section sidebar (see not_in_nav below).
nav:
  - Azure:
      - blog/azure/index.md
      - blog/azure/getting-started.md
  - Linux:
      - blog/linux/index.md
      - blog/linux/getting-started.md
  - Terraform:
      - blog/terraform/index.md
      - blog/terraform/getting-started.md
  - Ansible:
      - blog/ansible/index.md
      - blog/ansible/getting-started.md
  - Kubernetes:
      - blog/kubernetes/index.md
      - blog/kubernetes/getting-started.md
  - Monitoring:
      - blog/monitoring/index.md
      - blog/monitoring/getting-started.md

not_in_nav: |
  /index.md
  /blog/index.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Youssaid-tech
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/youssef-oussaid-95121b135
      name: LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:oussaid-youssef@outlook.fr
      name: Email

extra_css:
  - stylesheets/extra.css
  - stylesheets/home.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
